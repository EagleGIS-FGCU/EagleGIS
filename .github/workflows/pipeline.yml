name: EagleGIS Data Pipeline

permissions:
  contents: write  # Explicitly allow the bot to push changes

on:
  push:
    branches:
      - script
    paths:
      - 'pdfs/**'
      - 'estero_map_data.csv'
      - 'sanitizeData.py'

jobs:
  refine-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install pandas

      - name: Execute Professional Sanitation
        run: python sanitizeData.py

      - name: Commit and Push Polished Dataset
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add -f estero_map_data_polished.csv
          git commit -m "auto: professional data refinement update [skip ci]" || echo "No changes to commit"
          git push origin script
