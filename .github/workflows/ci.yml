name: CI

# Runs on every push and PR. Three independent jobs so a failure in one
# doesn't mask failures in the others. None of these jobs require Supabase
# credentials; the publish/drift-watch workflows handle that surface.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1) Unit + integration tests (pytest)
  # ---------------------------------------------------------------------------
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

  # ---------------------------------------------------------------------------
  # 2) Pipeline build + "silver is up to date" guard
  #
  # If a contributor edits a bronze CSV or reference YAML but forgets to
  # rebuild silver, this job fails. The point is that silver/ in the repo
  # is always a deterministic function of bronze + reference + pipeline code.
  # ---------------------------------------------------------------------------
  pipeline:
    name: pipeline build (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build silver (strict; fail on any reject)
        run: python -m app.pipeline.run --strict

      - name: Verify committed silver matches rebuild
        run: |
          if ! git diff --exit-code --stat -- app/data/silver/; then
            echo ""
            echo "::error::Silver layer is out of date. Run:" \
                 "python -m app.pipeline.run, then commit app/data/silver/"
            exit 1
          fi

      - name: Upload latest run manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-manifest-${{ github.run_id }}
          path: app/data/runs/
          retention-days: 30
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # 3) FastAPI health check — only runs when Supabase secrets are present
  # ---------------------------------------------------------------------------
  api-health:
    name: api health (Supabase)
    runs-on: ubuntu-latest
    needs: test
    if: ${{ vars.RUN_API_HEALTH == 'true' }}
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Start server and run health check
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          sleep 3
          curl --fail http://127.0.0.1:8000/health
          curl --fail http://127.0.0.1:8000/arcgis/rest/services/EagleAPI/FeatureServer
