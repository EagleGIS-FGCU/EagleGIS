<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EagleGIS | Estero Council Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #map-container { height: calc(100vh - 80px); position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .gothic-scroll::-webkit-scrollbar { width: 6px; }
        .gothic-scroll::-webkit-scrollbar-thumb { background: #4a5568; border-radius: 10px; }
        body { background-color: #0f172a; color: #f8fafc; }
    </style>
</head>
<body class="overflow-hidden">

    <header class="h-20 bg-slate-900 border-b border-slate-700 flex items-center px-6 justify-between">
        <div class="flex items-center space-x-3">
            <span class="text-2xl">🦅</span>
            <h1 class="text-xl font-bold tracking-tight text-indigo-400">EagleGIS <span class="text-slate-500 font-light">| Estero Tracker</span></h1>
        </div>
        
        <div class="flex items-center space-x-6">
            <a href="https://github.com/krocks9903/EagleGIS" target="_blank" class="flex items-center space-x-2 text-slate-400 hover:text-white transition-colors group">
                <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                <span class="text-sm font-mono border-b border-transparent group-hover:border-white">Source Code</span>
            </a>
            <div class="text-sm text-slate-400 font-mono hidden md:block">Status: <span class="text-green-400">CI/CD Active</span></div>
        </div>
    </header>

    <main class="flex">
        <aside class="w-96 bg-slate-900 h-[calc(100vh-80px)] border-r border-slate-700 flex flex-col">
            <div class="p-4 border-b border-slate-800">
                <input type="text" id="search" placeholder="Search meeting actions..." 
                       class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-white">
            </div>
            <div id="list" class="flex-grow overflow-y-auto gothic-scroll p-2 space-y-2">
                <div class="p-8 text-center text-slate-500">Grooming data... 🐾</div>
            </div>
        </aside>

        <section id="map-container" class="flex-grow">
            <iframe src="YOUR_ARC_GIS_EMBED_URL_HERE"></iframe>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <script>
        const CSV_URL = 'https://raw.githubusercontent.com/krocks9903/EagleGIS/script/estero_map_data_polished.csv';

        async function init() {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: (results) => {
                    renderData(results.data);
                }
            });
        }

        function renderData(data) {
            const listContainer = document.getElementById('list');
            const searchInput = document.getElementById('search');
            
            const displayData = (filteredData) => {
                listContainer.innerHTML = '';
                filteredData.forEach((row) => {
                    if(!row['Action Taken']) return;

                    const card = document.createElement('div');
                    card.className = "p-4 bg-slate-800 rounded-lg border border-slate-700 hover:border-indigo-500 cursor-pointer transition-all";
                    card.innerHTML = `
                        <div class="text-xs text-indigo-400 font-bold mb-1">${row['Meeting Date'] || 'N/A'}</div>
                        <div class="text-sm text-slate-200 line-clamp-3">${row['Action Taken']}</div>
                        <a href="${row['Document_Link']}" target="_blank" class="mt-3 inline-block text-xs bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-1 rounded transition-colors">View Minutes</a>
                    `;
                    listContainer.appendChild(card);
                });
            };

            displayData(data);

            // Search logic
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = data.filter(row => 
                    (row['Action Taken'] && row['Action Taken'].toLowerCase().includes(term)) ||
                    (row['Meeting Date'] && row['Meeting Date'].toLowerCase().includes(term))
                );
                displayData(filtered);
            });
        }

        init();
    </script>
</body>
</html>
