<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EagleGIS | Estero Council Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #map { height: calc(100vh - 80px); }
        .gothic-scroll::-webkit-scrollbar { width: 6px; }
        .gothic-scroll::-webkit-scrollbar-thumb { background: #4a5568; border-radius: 10px; }
        /* Alternative Style Theme */
        body { background-color: #0f172a; color: #f8fafc; }
    </style>
</head>
<body class="overflow-hidden">

    <header class="h-20 bg-slate-900 border-b border-slate-700 flex items-center px-6 justify-between">
        <div class="flex items-center space-x-3">
            <span class="text-2xl">🦅</span>
            <h1 class="text-xl font-bold tracking-tight text-indigo-400">EagleGIS <span class="text-slate-500 font-light">| Estero Tracker</span></h1>
        </div>
        <div class="text-sm text-slate-400 font-mono">Status: <span class="text-green-400">CI/CD Active</span></div>
    </header>

    <main class="flex">
        <aside class="w-96 bg-slate-900 h-[calc(100vh-80px)] border-r border-slate-700 flex flex-col">
            <div class="p-4 border-b border-slate-800">
                <input type="text" id="search" placeholder="Search meeting actions..." 
                       class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
            </div>
            <div id="list" class="flex-grow overflow-y-auto gothic-scroll p-2 space-y-2">
                <div class="p-8 text-center text-slate-500">Sniffing out data... 🐾</div>
            </div>
        </aside>

        <section id="map" class="flex-grow bg-slate-800"></section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <script>
        // Config
        const CSV_URL = 'https://raw.githubusercontent.com/krocks9903/EagleGIS/script/estero_map_data_polished.csv';
        const map = L.map('map').setView([26.4381, -81.8068], 13); // Centered on Estero

        // Dark Mode Map Tiles
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        async function init() {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                complete: (results) => {
                    renderData(results.data);
                }
            });
        }

        function renderData(data) {
            const listContainer = document.getElementById('list');
            const searchInput = document.getElementById('search');
            listContainer.innerHTML = '';

            data.forEach((row, index) => {
                if(!row.Location || !row.Action Taken) return;

                // Add Marker to Map (Note: Estero Village Hall is usually the spot)
                const marker = L.marker([26.4381, -81.8068]).addTo(map)
                    .bindPopup(`<b>${row.Meeting Date}</b><br>${row.Action Taken.substring(0, 100)}...`);

                // Add Card to Sidebar
                const card = document.createElement('div');
                card.className = "p-4 bg-slate-800 rounded-lg border border-slate-700 hover:border-indigo-500 cursor-pointer transition-all";
                card.innerHTML = `
                    <div class="text-xs text-indigo-400 font-bold mb-1">${row['Meeting Date']}</div>
                    <div class="text-sm text-slate-200 line-clamp-2">${row['Action Taken']}</div>
                    <a href="${row['Document_Link']}" target="_blank" class="mt-3 inline-block text-xs bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-1 rounded transition-colors">View Minutes</a>
                `;
                
                card.onclick = () => {
                    map.setView([26.4381, -81.8068], 15);
                    marker.openPopup();
                };

                listContainer.appendChild(card);
            });
        }

        init();
    </script>
</body>
</html>
