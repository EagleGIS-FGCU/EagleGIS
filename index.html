<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EagleGIS | Estero Council Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #0f172a; overflow: hidden; }
        
        #sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 400px;
            background: #020617;
            border-right: 4px solid #1e1b4b;
            display: flex;
            flex-direction: column;
            z-index: 50;
        }

        #map-spot {
            position: absolute;
            top: 0;
            left: 400px;
            right: 0;
            bottom: 0;
            background: #0f172a;
        }

        /* Essential for iframe visibility */
        iframe { width: 100%; height: 100%; border: none; display: block; }
        
        .gothic-scroll::-webkit-scrollbar { width: 8px; }
        .gothic-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; height: 45%; position: relative; border-right: none; border-bottom: 4px solid #1e1b4b; }
            #map-spot { left: 0; top: 45%; height: 55%; width: 100%; }
        }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="p-6 bg-slate-900 shadow-xl">
            <h1 class="text-3xl font-black text-indigo-400">🦅 EagleGIS</h1>
            <p class="text-slate-400 text-sm font-bold uppercase tracking-widest">Estero Council Tracker</p>
        </div>

        <div class="p-4 border-b border-slate-800">
            <label class="text-white font-bold block mb-2">Search Records:</label>
            <input type="text" id="main-search" placeholder="Search topics..." 
                   class="w-full bg-slate-800 border-2 border-slate-600 rounded-xl px-4 py-3 text-white text-lg focus:border-indigo-500 outline-none">
        </div>

        <div id="data-list" class="flex-grow overflow-y-auto gothic-scroll p-4 space-y-4">
            <div class="p-8 text-center text-slate-500 italic">Finding the latest actions... 🐾</div>
        </div>

        <div class="p-4 bg-slate-950 border-t border-slate-800 text-center text-[10px] text-slate-500 uppercase tracking-widest">
            Community Project | <a href="https://github.com/krocks9903/EagleGIS" target="_blank" class="hover:text-indigo-400 transition-colors">View Source</a>
        </div>
    </aside>

    <main id="map-spot">
        <iframe 
            src="https://eccl-swfl-safety.maps.arcgis.com/apps/mapviewer/index.html?webmap=586954199d83492896abf247343a33ee"
            allow="geolocation; clipboard-write"
            title="EagleGIS Interactive Map">
        </iframe>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script>
        const CSV_URL = 'https://raw.githubusercontent.com/krocks9903/EagleGIS/script/estero_map_data_polished.csv';
        let allData = [];

        async function init() {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: (results) => {
                    allData = results.data.filter(row => row['Action Taken'] && row['Action Taken'].trim() !== "");
                    renderList(allData);
                    setupSearch();
                }
            });
        }

        function renderList(data) {
            const list = document.getElementById('data-list');
            list.innerHTML = '';
            // Show top 30 most recent for seniors to browse
            const sorted = [...data].sort((a, b) => new Date(b.ArcGIS_Date) - new Date(a.ArcGIS_Date)).slice(0, 30);

            sorted.forEach(row => {
                const card = document.createElement('div');
                card.className = "p-5 bg-slate-900 rounded-2xl border-2 border-slate-800 shadow-xl hover:border-indigo-500 transition-all";
                card.innerHTML = `
                    <div class="text-indigo-400 font-bold text-xs mb-1 uppercase">${row['Meeting Date']}</div>
                    <div class="text-white text-lg font-bold leading-tight mb-4">${row['Action Taken']}</div>
                    <div class="flex justify-end">
                        <a href="${row['Document_Link']}" target="_blank" class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2 rounded-xl font-bold text-xs shadow-lg transition-colors">View PDF</a>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function setupSearch() {
            const input = document.getElementById('main-search');
            input.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = allData.filter(row => 
                    Object.values(row).some(v => String(v).toLowerCase().includes(term))
                );
                renderList(filtered);
            });
        }

        init();
    </script>
</body>
</html>
